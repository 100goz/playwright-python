name: Playwright Tests

on:
  push:
    branches: [ master ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Python 설치
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 패키지 설치
        run: pip install playwright pytest-playwright

      - name: 브라우저 설치
        run: playwright install --with-deps

      - name: 테스트 실행
        run: pytest test_example.py -v